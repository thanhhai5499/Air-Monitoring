version: '3.3'
services:
  auth-service:
    build: ./services/auth-service
    ports:
      - "5001:5001"
    env_file:
      - ./services/auth-service/config.env
    environment:
      - PORT=5001
      - DB_SERVER=host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  user-service:
    build: ./services/user-service
    ports:
      - "5002:5002"
    env_file:
      - ./services/user-service/config.env
    environment:
      - PORT=5002
      - DB_SERVER=host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  input-data-service:
    build: ./services/input-data-service
    ports:
      - "5003:5003"
    env_file:
      - ./services/input-data-service/config.env
    environment:
      - PORT=5003
      - DB_SERVER=host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  input-data-statistics-job:
    build: ./services/input-data-service
    command: node src/statisticsJob.js
    env_file:
      - ./services/input-data-service/config.env
    environment:
      - DB_SERVER=host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  data-service:
    build: ./services/data-service
    ports:
      - "5004:5004"
    env_file:
      - ./services/data-service/config.env
    environment:
      - PORT=5004
      - DB_SERVER=host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    volumes:
      - ./services/data-service/uploads:/app/uploads

  report-service:
    build: ./services/report-service
    ports:
      - "5005:5005"
    env_file:
      - ./services/report-service/config.env
    environment:
      - PORT=5005
      - DB_SERVER=host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  station-service:
    build: ./services/station-service
    ports:
      - "5006:5006"
    env_file:
      - ./services/station-service/config.env
    environment:
      - PORT=5006
      - DB_SERVER=host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  statistics-service:
    build: ./services/statistics-service
    ports:
      - "5007:5007"
    env_file:
      - ./services/statistics-service/config.env
    environment:
      - PORT=5007
      - DB_SERVER=host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
