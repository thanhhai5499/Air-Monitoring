# FE compose - runs the Nginx+SPA container only.
# BE services are deployed in a separate compose (BE/docker-compose.yml).
# The Nginx in this container reverse-proxies /api/* through host.docker.internal
# to BE ports 5001-5007 on the host.
services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aiot-frontend
    ports:
      - "3000:80"   # Cloudflare Tunnel ingress points here
    # Required on Linux (IBM host) so nginx can resolve host.docker.internal
    # to the Docker bridge gateway -> reach BE services on host ports.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
