# =============================================================
# FE Nginx config (runs INSIDE the FE container, nginx:1.27-alpine).
# No nginx is required on the IBM host.
#
# Architecture:
#   Cloudflare Tunnel -> host:3000 (this container) -> static SPA
#                                                    -> /api/* reverse-proxy
#                                                       via host.docker.internal
#                                                       to BE services exposed
#                                                       on the host (5001-5007).
#
# FE and BE are deployed as TWO SEPARATE docker compose projects, so we
# cannot use container DNS names. We hop through the Docker host gateway.
# On Linux, the FE compose maps `host.docker.internal` to host-gateway.
# =============================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 20m;

    # ---------- auth-service (host:5001) ----------
    location = /api/auth {
        proxy_pass http://host.docker.internal:5001/auth;
        include /etc/nginx/conf.d/proxy-headers.conf;
    }

    location /api/auth/ {
        proxy_pass http://host.docker.internal:5001/auth/;
        include /etc/nginx/conf.d/proxy-headers.conf;
    }

    # ---------- user-service (host:5002) ----------
    location = /api/user {
        proxy_pass http://host.docker.internal:5002/;
        include /etc/nginx/conf.d/proxy-headers.conf;
    }

    location /api/user/ {
        proxy_pass http://host.docker.internal:5002/;
        include /etc/nginx/conf.d/proxy-headers.conf;
    }

    # ---------- data-service (host:5004) ----------
    location = /api/data {
        proxy_pass http://host.docker.internal:5004/;
        include /etc/nginx/conf.d/proxy-headers.conf;
    }

    location /api/data/ {
        proxy_pass http://host.docker.internal:5004/;
        include /etc/nginx/conf.d/proxy-headers.conf;
    }

    # ---------- report-service (host:5005) ----------
    location = /api/report {
        proxy_pass http://host.docker.internal:5005/;
        include /etc/nginx/conf.d/proxy-headers.conf;
    }

    location /api/report/ {
        proxy_pass http://host.docker.internal:5005/;
        include /etc/nginx/conf.d/proxy-headers.conf;
    }

    # ---------- station-service (host:5006) ----------
    location = /api/station {
        proxy_pass http://host.docker.internal:5006/;
        include /etc/nginx/conf.d/proxy-headers.conf;
    }

    location /api/station/ {
        proxy_pass http://host.docker.internal:5006/;
        include /etc/nginx/conf.d/proxy-headers.conf;
    }

    # ---------- statistics-service (host:5007) ----------
    location = /api/statistic {
        proxy_pass http://host.docker.internal:5007/;
        include /etc/nginx/conf.d/proxy-headers.conf;
    }

    location /api/statistic/ {
        proxy_pass http://host.docker.internal:5007/;
        include /etc/nginx/conf.d/proxy-headers.conf;
    }

    location = /api/statistics {
        proxy_pass http://host.docker.internal:5007/;
        include /etc/nginx/conf.d/proxy-headers.conf;
    }

    location /api/statistics/ {
        proxy_pass http://host.docker.internal:5007/;
        include /etc/nginx/conf.d/proxy-headers.conf;
    }

    # ---------- input-data-service (host:5003) ----------
    location = /api/input-data {
        proxy_pass http://host.docker.internal:5003/;
        include /etc/nginx/conf.d/proxy-headers.conf;
    }

    location /api/input-data/ {
        proxy_pass http://host.docker.internal:5003/;
        include /etc/nginx/conf.d/proxy-headers.conf;
    }

    # ---------- SPA fallback ----------
    location / {
        try_files $uri $uri/ /index.html;
    }
}
