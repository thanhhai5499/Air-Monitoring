version: '3.2'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    command: npm run preview
    ports:
      - "3000:3000"
    restart: unless-stopped
    networks:
      - app-network

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
